[build]
builder = "nixpacks"
buildCommand = "bash build.sh"

[deploy]
startCommand = "python manage.py migrate --noinput && /opt/venv/bin/gunicorn config.wsgi:application --workers 2 --bind 0.0.0.0:$PORT --timeout 120 --access-logfile - --error-logfile - --log-level debug"
healthcheckPath = "/health/"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
