[build]
builder = "nixpacks"
buildCommand = "bash build.sh"

[deploy]
startCommand = "python manage.py migrate --noinput && /opt/venv/bin/gunicorn config.wsgi:application --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
healthcheckPath = "/dashboard/"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
